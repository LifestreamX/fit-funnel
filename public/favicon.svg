<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dumbbell design -->
  <!-- Left weight -->
  <rect x="5" y="35" width="15" height="30" rx="3" fill="url(#grad)"/>
  <!-- Left bar -->
  <rect x="20" y="45" width="15" height="10" fill="url(#grad)"/>
  <!-- Center bar -->
  <rect x="35" y="47" width="30" height="6" fill="url(#grad)"/>
  <!-- Right bar -->
  <rect x="65" y="45" width="15" height="10" fill="url(#grad)"/>
  <!-- Right weight -->
  <rect x="80" y="35" width="15" height="30" rx="3" fill="url(#grad)"/>
</svg>
